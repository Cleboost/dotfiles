# Configuration file for sddm-cleboost theme

[General]
# Path to the background image.
background=background.jpg

# Disable blurred background (crisp image as in reference)
blur=false
blurRadius=0

# Colors mapping (Modern Dark Premium Theme)
backgroundColor="#1e1e2e"
cardBackgroundColor="rgba(15, 17, 26, 0.8)"
borderColor="rgba(255, 255, 255, 0.1)"
textColor="#ffffff"
accentColor="#89b4fa"
errorColor="#f38ba8"

# Fonts
fontFamily="Inter"
fontSize=10

# Rounding for cards and input fields
borderRadius=22
