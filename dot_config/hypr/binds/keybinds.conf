# #######################################################################################
#  APPLICATIONS & SYSTEM UTILS
# #######################################################################################

##! Apps
bind = Super, T, exec, kitty -1                                # Terminal
bind = Super, E, exec, "thunar"                                # File Manager
bind = Super, W, exec, "google-chrome-stable"                  # Browser
bind = Alt, G, exec, ~/.config/hypr/hyprland/scripts/autoclicker.sh # Autoclicker

##! Utilities
bind = Super+Shift, S, exec, hyprshot -m region --freeze --clipboard-only # Screenshot
bind = , Print, exec, hyprshot -m region --freeze --clipboard-only        # Screenshot
bind = Super, X, exec, ~/.local/bin/dictate.sh                 # Dictation (Whisper)
bindd = Super+Shift, C, Color picker, exec, hyprpicker -a      # Color Picker
bindd = Super, H, Launch Hotspot, exec, ~/.config/hypr/hyprland/scripts/hotspot.sh # Hotspot

##! Zoom & Screen
bind = SUPER, Z, exec, ~/.config/hypr/hyprland/scripts/cursor_zoom.sh up
bind = SUPER, A, exec, ~/.config/hypr/hyprland/scripts/cursor_zoom.sh down
bind = SUPER_SHIFT, Z, exec, ~/.config/hypr/hyprland/scripts/cursor_zoom.sh reset

# #######################################################################################
#  WINDOW MANAGEMENT
# #######################################################################################

##! Window Actions
bind = Super, Q, killactive,                                   # Close window
bind = Super+Alt, Space, togglefloating,                       # Toggle Float
bind = Super, F, fullscreen, 0                                 # Toggle Fullscreen
bind = Super+Shift+Alt, Q, exec, hyprctl kill                  # Force Kill (xkill style)

##! Focus & Move
# Mouse Controls
bindm = Super, mouse:272, movewindow                           # Move with Mouse
bindm = Super, mouse:273, resizewindow                         # Resize with Mouse
bindm = Super, mouse:274, movewindow                           # Move (Middle click)

# Keyboard Focus
bind = Super, Left, movefocus, l
bind = Super, Right, movefocus, r
bind = Super, Up, movefocus, u
bind = Super, Down, movefocus, d
bind = Super, BracketLeft, movefocus, l
bind = Super, BracketRight, movefocus, r

# Keyboard Move
bind = Super+Shift, Left, movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up, movewindow, u
bind = Super+Shift, Down, movewindow, d

# #######################################################################################
#  MEDIA CONTROLS (KEYBOARD)
# #######################################################################################

##! Standard Keys
bindl = Super+Shift, P, exec, playerctl play-pause
bindl = Super+Shift, N, exec, playerctl next
bindl = Super+Shift, B, exec, playerctl previous

# XF86 Keys
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

##! Extra Mouse Media
bind = Super+Shift+Alt, mouse:275, exec, playerctl previous
bind = Super+Shift+Alt, mouse:276, exec, playerctl next
