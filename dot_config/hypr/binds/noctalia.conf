# #######################################################################################
#  NOCTALIA SHELL & SYSTEM
# #######################################################################################

##! Shell Toggles
bind = Super, Super_L, exec, noctalia msg panel-toggle launcher        # Launcher (Left)
bind = Super, Super_R, exec, noctalia msg panel-toggle launcher        # Launcher (Right)
bind = Ctrl+Super, T, exec, noctalia msg panel-toggle wallpaper        # Wallpaper selector
bind = SUPER, comma, exec, noctalia msg settings-toggle                # Settings Panel
bind = Ctrl+Alt, Delete, exec, noctalia msg panel-toggle session       # Session menu
bindd = Super, V, Clipboard history, exec, noctalia msg panel-toggle clipboard # Clipboard

##! System Controls
# Volume
bindle = , XF86AudioRaiseVolume, exec, noctalia msg volume-up           # Volume Up
bindle = , XF86AudioLowerVolume, exec, noctalia msg volume-down         # Volume Down
bindl  = , XF86AudioMute, exec, noctalia msg volume-mute                # Mute/Unmute
bindl  = , XF86AudioMicMute, exec, noctalia msg mic-mute                # Mute Microphone

# Brightness
bindle = , XF86MonBrightnessUp, exec, noctalia msg brightness-up       # Brightness Up
bindle = , XF86MonBrightnessDown, exec, noctalia msg brightness-down   # Brightness Down

# Power/Lock
bindd = Super, L, Lock, exec, noctalia msg screen-lock                 # Lock Screen
bind = Super, F5, exec, ~/.config/hypr/scripts/power_profile.sh         # Cycle Power Profile

##! Media (Mouse Specific)
bind = Super, mouse:275, exec, noctalia msg media previous             # Super + Mouse Back
bind = Super, mouse:276, exec, noctalia msg media next                 # Super + Mouse Forward

##! Shell Management
bindd = Ctrl+Super+Alt, R, Restart shell, exec, pkill noctalia; noctalia # Restart Shell
bindd = Ctrl+Shift+Super+Alt, R, Restart shell, exec, pkill noctalia     # Kill Shell
bind = Ctrl+Super+Alt, T, exec, noctalia msg wallpaper-random          # Random wallpaper

