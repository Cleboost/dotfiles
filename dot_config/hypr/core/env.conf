# #######################################################################################
#   ENVIRONMENT VARIABLES
# #######################################################################################

##! Wayland & Ozone
env = ELECTRON_OZONE_PLATFORM_HINT, auto

##! XDG & Applications
env = XDG_DATA_DIRS, $HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share
env = TERMINAL, kitty -1

##! Toolkit Themes (QT/GTK)
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, kde
env = QT_STYLE_OVERRIDE, kvantum
env = XDG_MENU_PREFIX, plasma-
env = GTK_THEME, WhiteSur-Dark
env = GTK_ICON_THEME, WhiteSur-dark
env = GTK_USE_PORTAL, 0

##! Cursor
env = XCURSOR_THEME, macOS
env = XCURSOR_SIZE, 24

##! Nvidia Specific
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = LIBVA_DRIVER_NAME, nvidia
env = GBM_BACKEND, nvidia-drm
env = __GL_GSYNC_ALLOWED, 1
env = __GL_VRR_ALLOWED, 1
env = NVD_BACKEND, direct
env = AQ_FORCE_LINEAR_BLIT, 0
