
# ============= General App & System Keybinds ============

# General
bind = Super, Q, killactive, # Close

# Apps
bind = Super, T, exec, kitty -1
bind = Super, E, exec, "thunar"
bind = Super, W, exec, "google-chrome-stable"
bind = Alt, G, exec, ~/.config/hypr/hyprland/scripts/autoclicker.sh

# Utils
bind = Super+Shift, S, exec, hyprshot -m region --freeze --clipboard-only # Screenshot region
bind = , Print, exec, hyprshot -m region --freeze --clipboard-only # Screenshot region
bind = Super, X, exec, ~/.local/bin/dictate.sh # Dictation whisper
bindd = Super+Shift, C, Color picker, exec, hyprpicker -a # Color Picker
bindd = Super, H, Launch Hotspot, exec, ~/.config/hypr/hyprland/scripts/hotspot.sh # Hotspot

# Window Management
bindm = Super, mouse:272, movewindow # Move
bindm = Super, mouse:274, movewindow # [hidden]
bindm = Super, mouse:273, resizewindow # Resize

bind = Super, Left, movefocus, l # [hidden]
bind = Super, Right, movefocus, r # [hidden]
bind = Super, Up, movefocus, u # [hidden]
bind = Super, Down, movefocus, d # [hidden]
bind = Super, BracketLeft, movefocus, l # [hidden]
bind = Super, BracketRight, movefocus, r # [hidden]

bind = Super+Shift, Left, movewindow, l # [hidden]
bind = Super+Shift, Right, movewindow, r # [hidden]
bind = Super+Shift, Up, movewindow, u # [hidden]
bind = Super+Shift, Down, movewindow, d # [hidden]

bind = Super+Shift+Alt, Q, exec, hyprctl kill # Forcefully zap a window
bind = Super+Alt, Space, togglefloating, # Float/Tile
bind = Super, F, fullscreen, 0 # Fullscreen

# Zoom / Screen
bind = SUPER, Z, exec, ~/.config/hypr/hyprland/scripts/cursor_zoom.sh up
bind = SUPER, A, exec, ~/.config/hypr/hyprland/scripts/cursor_zoom.sh down
bind = SUPER_SHIFT, Z, exec, ~/.config/hypr/hyprland/scripts/cursor_zoom.sh reset

# Media (fallback/keyboard)
bindl= Super+Shift, N, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # Next track
bindl= ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl= ,XF86AudioPrev, exec, playerctl previous # [hidden]
bindl= Super+Shift, B, exec, playerctl previous # Previous track
bindl= Super+Shift, P, exec, playerctl play-pause # Play/pause media
bindl= ,XF86AudioPlay, exec, playerctl play-pause # [hidden]
bindl= ,XF86AudioPause, exec, playerctl play-pause # [hidden]

# Extra Media mouse binds
bind = Super+Shift+Alt, mouse:275, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:276, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
