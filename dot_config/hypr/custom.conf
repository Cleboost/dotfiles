# #######################################################################################
#   PERSONAL OVERRIDES — loaded last, overrides everything including noctalia
# #######################################################################################

##! Glass-style borders — uniform semi-transparent, diagonal shimmer
general {
    border_size = 6
    col.active_border = rgba(ffffff66) rgba(ffffff33) 135deg
    col.inactive_border = rgba(ffffff22) rgba(ffffff11) 135deg
}

plugin {
    dynamic-cursors {
        enabled = false
        mode = stretch # options: none, tilt, rotate, stretch

        shake {
            enabled = true
            nearest = false
            base = 1.0
            speed = 4.0
            influence = 2.0
            limit = 3.0
            threshold = 3.0
            timeout = 1000
        }

        hyprcursor {
            enabled = true
            resolution = 256
            fallback = default
        }
    }
}

# ── Physiques et Animations Fluides (Rebond Élastique & Aspiration macOS)
animations {
    enabled = true
    
    # Courbe style ressort macOS : forte accélération, dépassement et amortissement doux
    bezier = macSpring, 0.25, 1.4, 0.2, 1.02
    # Courbe ultra-lisse et progressive sans aucun rebond
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    # Courbe d'aspiration agressive pour l'effet Dock (zoom progressif)
    bezier = dockSuction, 0.34, 1.56, 0.64, 1
    
    # Mouvements de fenêtres : glissement très fluide style ressort macOS
    animation = windowsMove, 1, 4.0, macSpring, slide
    
    # Changement de workspaces : glissement propre et continu, sans AUCUN rebond (easeOutQuint)
    animation = workspaces, 1, 4.5, easeOutQuint, slide
    
    # Ouverture/fermeture fenêtres : effet d'aspiration dock (commence à 5% de zoom)
    animation = windowsIn, 1, 3.8, dockSuction, popin 5%
    # Fermeture : beaucoup plus longue (vitesse passée à 6.2) pour bien apprécier le fondu d'aspiration
    animation = windowsOut, 1, 6.2, easeOutQuint, popin 5%
}

# ── Surcharges des Boutons Souris (Forcé dans le submap global de Noctalia)
submap = global

# 1. Nettoyage des anciens binds souris potentiellement bloqués
unbind = , mouse:275
unbind = , mouse:276
unbind = SUPER, mouse:275
unbind = SUPER, mouse:276
unbind = SUPER, mouse_up
unbind = SUPER, mouse_down
unbind = , mouse_up
unbind = , mouse_down

# 2. Enregistrement des binds souris fonctionnels
# Clic bouton latéral arrière -> musique précédente
bind = , mouse:275, exec, playerctl previous
# Clic bouton latéral avant -> musique suivante
bind = , mouse:276, exec, playerctl next

# Molette pour changer de workspace (avec binde + e+1/e-1)
binde = SUPER, mouse_up, workspace, e-1
binde = SUPER, mouse_down, workspace, e+1
binde = , mouse_up, workspace, e-1
binde = , mouse_down, workspace, e+1

# Toujours terminer en restant sur le submap global de Noctalia
submap = global

