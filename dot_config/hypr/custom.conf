# #######################################################################################
#   PERSONAL OVERRIDES — loaded last, overrides everything including noctalia
# #######################################################################################

##! Glass-style borders — uniform semi-transparent, diagonal shimmer
general {
    border_size = 6
    col.active_border = rgba(ffffff66) rgba(ffffff33) 135deg
    col.inactive_border = rgba(ffffff22) rgba(ffffff11) 135deg
}

plugin {
    dynamic-cursors {
        enabled = true
        mode = stretch # options: none, tilt, rotate, stretch

        shake {
            enabled = true
            nearest = false
            base = 1.0
            speed = 4.0
            influence = 2.0
            limit = 3.0
            threshold = 3.0
            timeout = 1000
        }

        hyprcursor {
            enabled = true
            resolution = 256
            fallback = default
        }
    }
}

# ── Physiques et Animations Fluides (Rebond Élastique & Aspiration)
animations {
    enabled = true
    
    # Courbe avec dépassement physique (overshoot) pour donner un effet élastique réaliste
    bezier = fluidElastic, 0.15, 1.15, 0.3, 1.05
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    # Courbe ultra rapide au début et douce à la fin pour l'effet d'aspiration
    bezier = suctionCurve, 0.5, 0, 0.1, 1.1
    
    # Mouvements de fenêtres : très fluide et rapide (vitesse = 3.8) avec rebond élastique
    animation = windowsMove, 1, 3.8, fluidElastic, slide
    
    # Changement de workspaces : effet de fondu glissé très élégant (slidefade 20%)
    animation = workspaces, 1, 4.2, fluidElastic, slidefade 20%
    
    # Ouverture/fermeture fenêtres : effet d'aspiration (commence à 0% de zoom avec une courbe agressive)
    animation = windowsIn, 1, 4.0, suctionCurve, popin 0%
    animation = windowsOut, 1, 3.5, suctionCurve, popin 0%
}

bind = SUPER, Tab, overview:toggle
