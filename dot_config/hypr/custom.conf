# #######################################################################################
#   PERSONAL OVERRIDES — loaded last, overrides everything including noctalia
# #######################################################################################

##! Glass-style borders — uniform semi-transparent, diagonal shimmer
general {
    border_size = 6
    col.active_border = rgba(ffffff66) rgba(ffffff33) 135deg
    col.inactive_border = rgba(ffffff22) rgba(ffffff11) 135deg
}

plugin {
    dynamic-cursors {
        enabled = true
        mode = none # options: none, tilt, rotate, stretch

        shake {
            enabled = true
            influence = 0.8
            base = 3.0
            speed = 7.0
            threshold = 3.0
            timeout = 1000
        }
    }
}

bind = SUPER, Tab, overview:toggle
