# #######################################################################################
#   PERSONAL OVERRIDES — loaded last, overrides everything including noctalia
# #######################################################################################

##! Glass-style borders — uniform semi-transparent, diagonal shimmer
general {
    border_size = 6
    col.active_border = rgba(ffffff66) rgba(ffffff33) 135deg
    col.inactive_border = rgba(ffffff22) rgba(ffffff11) 135deg
}

plugin {
    dynamic-cursors {
        enabled = true
        mode = stretch # options: none, tilt, rotate, stretch

        shake {
            enabled = true
            nearest = false
            base = 1.0
            speed = 4.0
            influence = 2.0
            limit = 3.0
            threshold = 3.0
            timeout = 1000
        }

        hyprcursor {
            enabled = true
            resolution = 256
            fallback = default
        }
    }
}

# ── Animations fluides sans aucun rebond
animations {
    enabled = true

    # Courbe lisse sans overshoot — Y reste dans [0, 1]
    bezier = easeOutQuint, 0.22, 1, 0.36, 1

    # Mouvements de fenêtres
    animation = windowsMove, 1, 4.0, easeOutQuint, slide

    # Ouverture fenêtres : grossit depuis 5% → 100%, sans rebond
    animation = windowsIn,  1, 3.5, easeOutQuint, popin 5%

    # Fermeture fenêtres : rétrécit de 100% → 5%, sans rebond
    animation = windowsOut, 1, 3.5, easeOutQuint, popin 5%

    # Workspaces
    animation = workspaces, 1, 4.5, easeOutQuint, slide
}

# ── Surcharges des Boutons Souris (Forcé dans le submap global de Noctalia)
submap = global

# 1. Nettoyage des anciens binds souris potentiellement bloqués
unbind = , mouse:275
unbind = , mouse:276
unbind = SUPER, mouse:275
unbind = SUPER, mouse:276
unbind = SUPER, mouse_up
unbind = SUPER, mouse_down
unbind = , mouse_up
unbind = , mouse_down

# 2. Enregistrement des binds souris fonctionnels
# Clic bouton latéral arrière -> musique précédente
bind = , mouse:275, exec, playerctl previous
# Clic bouton latéral avant -> musique suivante
bind = , mouse:276, exec, playerctl next

# Molette pour changer de workspace (avec binde + e+1/e-1)
binde = SUPER, mouse_up, workspace, e-1
binde = SUPER, mouse_down, workspace, e+1
binde = , mouse_up, workspace, e-1
binde = , mouse_down, workspace, e+1

# Toujours terminer en restant sur le submap global de Noctalia
submap = global

