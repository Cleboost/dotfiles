# #######################################################################################
#   PERSONAL OVERRIDES — loaded last, overrides everything including noctalia
# #######################################################################################

##! Glass-style borders — uniform semi-transparent, diagonal shimmer
general {
    border_size = 6
    col.active_border = rgba(ffffff66) rgba(ffffff33) 135deg
    col.inactive_border = rgba(ffffff22) rgba(ffffff11) 135deg
}

plugin {
    dynamic-cursors {
        enabled = true
        mode = stretch # options: none, tilt, rotate, stretch

        shake {
            enabled = true
            nearest = false
            base = 1.0
            speed = 4.0
            influence = 2.0
            limit = 3.0
            threshold = 3.0
            timeout = 1000
        }

        hyprcursor {
            enabled = true
            resolution = 256
            fallback = default
        }
    }
}

# ── Physiques et Animations Fluides (Rebond Élastique sur Fenêtres & Workspaces)
animations {
    enabled = true
    
    # Courbe avec dépassement physique (overshoot) pour donner un effet élastique réaliste
    bezier = fluidElastic, 0.15, 1.15, 0.3, 1.05
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    
    # Mouvements de fenêtres : très fluide et rapide (vitesse = 3.8) avec rebond élastique
    animation = windowsMove, 1, 3.8, fluidElastic, slide
    # Changement de workspaces : effet élastique glissé magnifique
    animation = workspaces, 1, 4.2, fluidElastic, slide
    # Ouverture/fermeture fenêtres : effet d'apparition élastique en zoom
    animation = windowsIn, 1, 3.5, fluidElastic, popin 80%
    animation = windowsOut, 1, 3.0, easeOutQuint, popin 85%
}

bind = SUPER, Tab, overview:toggle
