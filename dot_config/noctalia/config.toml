# Noctalia configuration — all settings at their defaults.
# Copy to ~/.config/noctalia/config.toml and edit what you need.
# Changes are hot-reloaded via inotify — no restart required.

# ── Shell ─────────────────────────────────────────────────────────────────────

[shell]
ui_scale               = 1.0
font_family            = "sans-serif"
offline_mode           = false        # block all outgoing HTTP when true
telemetry_enabled      = true        # send an anonymous usage ping on startup
polkit_agent           = true
password_style         = "default"    # default | random
settings_show_advanced = false       # show advanced settings by default in Settings
show_location          = true         # hide weather location text in shell UI when false
clipboard_auto_paste   = "off"
avatar_path            = "/home/cleboost/Pictures/profile.png"
lang                   = "fr"
corner_radius_scale    = 2.0
screen_time_enabled    = true

[shell.animation]
enabled = true
speed   = 1.0                       # 0.5 = 2× slower, 2.0 = 2× faster

[shell.shadow]
blur     = 12                       # global surface shadow blur radius
offset_x = 2
offset_y = 2                        # positive = down
alpha    = 0.55                     # multiplied by each component's background opacity

[shell.mpris]
blacklist = []                      # ignore MPRIS players by bus/identity/desktop entry token

[shell.screen_corners]
enabled = true

# ── Wallpaper ─────────────────────────────────────────────────────────────────

[wallpaper]
enabled             = true
fill_mode           = "crop"        # center | crop | fit | stretch | repeat
fill_color          = ""            # optional fallback/fill color: #RRGGBB, #RRGGBBAA, or theme role
transition          = ["disc", "stripes", "zoom"]
transition_duration = 1500          # milliseconds
edge_smoothness     = 0.3
directory           = "~/Pictures/Wallpapers"
directory_light     = ""            # optional day-mode directory
directory_dark      = ""            # optional night-mode directory

[wallpaper.automation]
enabled                    = false
interval_minutes           = 0       # 0 = disabled
order                      = "random" # random | alphabetical
recursive                  = true    # include subdirectories when picking random wallpapers

# ── Theme ─────────────────────────────────────────────────────────────────────

[theme]
mode    = "dark"                       # dark | light | auto
source  = "wallpaper"                  # builtin | wallpaper | community
builtin = "Ayu"                  # Ayu | Catppuccin | Dracula | Eldritch | Gruvbox |
                                      # Kanagawa | Noctalia | Nord | Rosé Pine | Tokyo-Night
community_palette = "ADW"      # fetched from api.noctalia.dev, cached locally
wallpaper_scheme = "m3-content"    # m3-tonal-spot | m3-content | m3-fruit-salad |
                                      # m3-rainbow | m3-monochrome | vibrant | faithful |
                                      # dysfunctional | muted

[theme.templates]
enable_builtins       = true
builtin_ids           = [ "btop", "gtk3", "gtk4", "hyprland", "kitty", "qt", "starship" ] # opt-in; list ids with: noctalia theme --list-builtins
community_ids         = []
enable_user_templates = false
user_config           = "~/.config/noctalia/user-templates.toml"


# ── Overview ──────────────────────────────────────────────────────────────────

[overview]
enabled                = false
unload_when_not_in_use = true
blur_intensity         = 0.5        # 0.0 = no blur, 1.0 = maximum
tint_intensity         = 0.3        # 0.0 = no tint, 1.0 = opaque

# ── Notifications ─────────────────────────────────────────────────────────────

[notification]
enable_daemon      = true
background_opacity = 0.97

# ── OSD ───────────────────────────────────────────────────────────────────────

[osd]
position = "top_right"              # top_right | top_left | top_center | bottom_right | bottom_left | bottom_center

# ── System Monitor ────────────────────────────────────────────────────────────

[system.monitor]
enabled = true                      # sample CPU, memory, network, load, temperature, and disk statistics

# ── Weather ───────────────────────────────────────────────────────────────────

[weather]
enabled         = true
auto_locate     = true              # resolve location from IP when true
address         = "Toronto, ON"     # geocoded when auto_locate = false
refresh_minutes = 30
unit            = "celsius"         # celsius | fahrenheit

# ── Audio ─────────────────────────────────────────────────────────────────────

[audio]
enable_overdrive = false            # allow volume above 100% (up to 150%)
enable_sounds = true                # master toggle for UI feedback sounds
sound_volume = 0.5                  # 0.0 - 1.0
volume_change_sound = ""            # empty = bundled sounds/volume-change.wav
notification_sound = ""             # empty = bundled sounds/notification.wav

# ── Brightness ────────────────────────────────────────────────────────────────

[brightness]
enable_ddcutil = false

# ── Night Light ───────────────────────────────────────────────────────────────

[nightlight]
enabled              = false
force                = false
use_weather_location = true
temperature_day      = 6500         # Kelvin
temperature_night    = 4000         # Kelvin

# ── Idle ──────────────────────────────────────────────────────────────────────

[idle.behavior.lock]
timeout = 660
command = "noctalia:lock"
enabled = false

# ── Keybinds ──────────────────────────────────────────────────────────────────

[keybinds]
validate = ["return", "kp_enter"]
cancel   = ["escape"]
left     = ["left"]
right    = ["right"]
up       = ["up"]
down     = ["down"]

# ── Bar ───────────────────────────────────────────────────────────────────────
#[bar]
#order = [ "main" ]

[bar.main]
position           = "top"          # top | bottom | left | right
thickness          = 34
background_opacity = 0.85
radius             = 80
radius_top_left    = 0
radius_top_right   = 0
margin_h           = 180
margin_v           = 10
margin_edge        = 0
margin_ends        = 230
padding            = 14
widget_spacing     = 6
scale              = 1.0
shadow             = true
auto_hide          = false
reserve_space      = true
capsule            = false

start = [ "cpu", "temp", "ram", "workspaces" ]
center = [ "media", "audio_visualizer" ]
end = [ "cat", "recorder", "notifications", "tray", "screen_recorder", "clock", "control-center" ]

[widget.audio_visualizer]
capsule = true
show_when_idle = true

[widget.bongocat]
type   = "scripted"
script = "scripts/bongocat.lua"
input_device = "/dev/input/event3"
capsule = false

[widget.cat]
input_device = "/dev/input/event3"
type = "noctalia/bongocat:cat"

[widget.cpu]
display = "gauge"
show_label = false
type = "sysmon"

[widget.sysmon]
stat = "cpu_usage"

[widget.media]
capsule = true

[widget.ram]
show_label = false

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.screen_recorder]
type              = "scripted"
script            = "scripts/screen_recorder.lua"
directory         = "Videos"
filename_pattern  = "recording_%Y%m%d_%H%M%S"
video_codec       = "av1"
audio_codec       = "opus"
audio_source      = "both"
quality           = "ultra"
frame_rate        = 144
color_range       = "limited"
resolution        = "original"
show_cursor       = true
copy_to_clipboard = false
restore_portal    = true
replay_enabled    = false
replay_duration   = 30
replay_storage    = "ram"
hide_inactive     = false

[widget.temp]
show_label = false

[widget.tray]
capsule = true
drawer = true
hidden = [ "spotify", "discord" ]
pinned = [ "MP-wLD5ZvD" ]

[widget.workspaces]
capsule = true
display = "name"

# ── Dock ──────────────────────────────────────────────────────────────────────

[dock]
enabled             = false         # set true to activate
position            = "bottom"      # top | bottom | left | right
icon_size           = 48
padding             = 8
item_spacing        = 6
background_opacity  = 0.88
radius              = 16
margin_h            = 0
margin_v            = 8
shadow              = true
show_running        = true
auto_hide           = false
reserve_space       = false
active_scale        = 1.0
inactive_scale      = 0.85
active_opacity      = 1.0
inactive_opacity    = 0.85
show_instance_count = true
active_monitor_only = false
pinned              = []            # e.g. ["firefox", "code", "kitty"]

# ── Desktop Widgets ───────────────────────────────────────────────────────────

[desktop_widgets]
enabled = true

# ── Hooks ─────────────────────────────────────────────────────────────────────

[hooks]
battery_low_percent_threshold = 30

# ── Plugins ───────────────────────────────────────────────────────────────────

[plugins]
enabled = [
    "noctalia/bongocat",
    "noctalia/screen_recorder"
]

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    auto_update = true
    enabled = false
    kind = "git"
    location = "https://github.com/Cleboost/noctalia-plugins"
    name = "cleboost-plugin"

    [[plugins.source]]
    kind = "path"
    location = "~/Projects/noctalia/custom-plugins"
    name = "custom"

[plugin_settings."noctalia/screen_recorder"]
frame_rate = 144
quality = "ultra"
video_codec = "hevc"
video_source = "portal"

