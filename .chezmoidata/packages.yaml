# ~/.local/share/chezmoi/.chezmoidata/packages.yaml

# 1. Définition de toutes les catégories de paquets disponibles
categories:
  arch:
    yay:
      # Paquets de base installés automatiquement sur TOUTES les machines
      base:
        - base-devel
        - kitty
        - fish
        - starship
        - eza
        - fastfetch
        - git
        - rust
        - bun
        - nodejs
        - npm
        - nautilus
        - google-chrome
        - jetbrains-toolbox
        - zed
        - antigravity-cli

      # Catégories optionnelles ou spécifiques à certains PC
      development:
        - git
        - bun
        - rust
        - docker
        - docker-compose
        - docker-buildx
        - codegraph-rs-bin
      hyprland:
        - hyprland
        - gpu-screen-recorder
        - wlsunset
        - hyprshot
        - hyprpicker
      themes:
        - whitesur-icon-theme-git
      sddm:
        - qt5-graphicaleffects
        - qt5-quickcontrols2
      noctalia:
        - noctalia-git
        - ddcutil
        - power-profiles-daemon
      social:
        - discord
      music:
        - spotify
        - lollypop
      office:
        - onlyoffice-bin
        - evince
      gaming:
        - steam
      tools:
        - rustmius-bin

  bun:
    global:
      cli:
        - "@google/gemini-cli@nightly"

# 2. Association des hôtes (PC) aux catégories de paquets supplémentaires
hosts:
  # La catégorie "base" est installée pour tout le monde via le script.
  # On liste ici uniquement les catégories supplémentaires par machine.
  cleboost-brain:
    - hyprland
    - themes
    - sddm
    - development
    - noctalia
    - social
    - music
    - office
    - gaming
    - tools
